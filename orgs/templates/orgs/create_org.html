{% extends 'orgs/base.html' %}

{% block title %}New Organization – LedgerPro{% endblock %}

{% block content %}
<a href="{% url 'dashboard' %}" class="back-link">&larr; Back to Dashboard</a>

<div style="max-width: 600px; margin: 0 auto;">
    <div style="margin-bottom: 24px;">
        <h1 class="page-title">Create New Organization</h1>
        <p class="page-subtitle">Register a new club or student group</p>
    </div>

    <div class="card">
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Organization Name <span style="color: var(--danger);">*</span></label>
                <input type="text" name="name" class="form-control" placeholder="e.g. Debate Club, Student Government"
                    required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Initial Budget ($)</label>
                <input type="number" name="budget" step="0.01" class="form-control" placeholder="0.00" value="0.00">
            </div>
            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="4"
                    placeholder="Briefly describe the purpose of this organization..."></textarea>
            </div>
            <hr class="divider">
            <div style="display: flex; justify-content: flex-end; gap: 10px;">
                <a href="{% url 'dashboard' %}" class="btn btn-outline">Cancel</a>
                <button type="submit" class="btn btn-primary">Create Organization</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
