{% extends "orgs/base.html" %}
{% load i18n %}

{% block title %}Sign Out - LedgerPro{% endblock %}

{% block content %}
<div class="glass-card" style="max-width: 400px; margin: 4rem auto; padding: 2.5rem; text-align: center;">
    <h1 style="color: white; font-size: 2rem; margin-bottom: 1rem;">Sign Out</h1>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Are you sure you want to sign out?</p>

    <form method="post" action="{% url 'account_logout' %}">
        {% csrf_token %}
        {% if redirect_field_value %}
        <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}" />
        {% endif %}
        <button class="btn btn-outline" type="submit" style="width: 100%; padding: 0.75rem;">Sign Out</button>
    </form>
</div>
{% endblock %}
