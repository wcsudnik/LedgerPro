<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete – LedgerPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #F1F5F9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            margin-bottom: 32px;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: #0A0A0A;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 800;
            color: #111827;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: #6D28D9;
        }

        .card {
            background: white;
            border: 1px solid #E5E7EB;
            border-radius: 16px;
            padding: 32px;
            text-align: center;
        }

        .icon-wrap {
            width: 56px;
            height: 56px;
            background: #DCFCE7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        h1 {
            font-size: 22px;
            font-weight: 800;
            color: #111827;
            letter-spacing: -0.4px;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            color: #6B7280;
            line-height: 1.65;
            margin-bottom: 28px;
        }

        .btn {
            display: block;
            width: 100%;
            background: #0A0A0A;
            color: white;
            border: none;
            padding: 11px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s;
            text-decoration: none;
            text-align: center;
        }

        .btn:hover {
            background: #1F1F1F;
        }
    </style>
</head>

<body>
    <div class="auth-wrapper">
        <a href="/" class="logo">
            <div class="logo-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                </svg>
            </div>
            <span class="logo-text">Ledger<span>Pro</span></span>
        </a>

        <div class="card">
            <div class="icon-wrap">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#16A34A" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12" />
                </svg>
            </div>

            <h1>Password updated!</h1>
            <p class="subtitle">
                Your password has been changed successfully.
                You can now sign in with your new password.
            </p>

            <a href="{% url 'account_login' %}" class="btn" id="go-to-signin">Sign in &rarr;</a>
        </div>
    </div>
</body>

</html>
